<!DOCTYPE html>
<html lang="id">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Dailiriz - Berita Terkini</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <link rel="preconnect" href="https://fonts.googleapis.com">  
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">  
    <script src="https://unpkg.com/lucide@latest"></script>  
    <script>  
        tailwind.config = {  
            theme: {  
                extend: {  
                    fontFamily: {  
                        sans: ['Inter', 'sans-serif'],  
                        serif: ['Playfair Display', 'serif'],  
                    },  
                    colors: {  
                        gold: {  
                            400: '#FFD700',  
                            500: '#DAA520',  
                        }  
                    }  
                }  
            }  
        }  
    </script>  
    <style>  
        ::-webkit-scrollbar {  
            width: 8px;  
        }  
        ::-webkit-scrollbar-track {  
            background: #f1f1f1;  
        }  
        ::-webkit-scrollbar-thumb {  
            background: #c53030;  
            border-radius: 4px;  
        }  
        ::-webkit-scrollbar-thumb:hover {  
            background: #9b2c2c;  
        }  
        .image-hover-zoom {  
            overflow: hidden;  
        }  
        .image-hover-zoom img {  
            transition: transform 0.5s ease;  
        }  
        .image-hover-zoom:hover img {  
            transform: scale(1.05);  
        }  
        .line-clamp-2 {  
            display: -webkit-box;  
            -webkit-line-clamp: 2;  
            -webkit-box-orient: vertical;  
            overflow: hidden;  
        }  
        .line-clamp-3 {  
            display: -webkit-box;  
            -webkit-line-clamp: 3;  
            -webkit-box-orient: vertical;  
            overflow: hidden;  
        }  
        #mobile-menu::-webkit-scrollbar {  
            width: 4px;  
        }  
        #mobile-menu::-webkit-scrollbar-track {  
            background: rgba(255,255,255,0.1);  
        }  
        #mobile-menu::-webkit-scrollbar-thumb {  
            background: rgba(255,215,0,0.5);  
            border-radius: 2px;  
        }  
    </style>  
</head>  
<body class="bg-stone-50 text-slate-800 flex flex-col min-h-screen">  
    <div id="layout-header"></div>

    <main id="spa-container" class="container mx-auto px-4 py-8 flex-grow"></main>  

    <div id="layout-footer"></div>

    <div id="toast" class="fixed bottom-5 right-5 bg-white border-l-4 border-green-500 text-slate-800 px-6 py-4 rounded shadow-2xl transform translate-y-24 transition-transform duration-300 z-50 flex items-center gap-3">  
        <i data-lucide="check-circle" class="text-green-500"></i>  
        <div>  
            <h4 class="font-bold text-sm">Berhasil!</h4>  
            <p class="text-xs text-slate-600">Terima kasih telah berlangganan.</p>  
        </div>  
    </div>  

    <div id="search-modal" class="fixed inset-0 bg-slate-900/95 z-[60] hidden flex-col p-6 md:p-20 transition-all duration-300 backdrop-blur-sm">
        <div class="max-w-4xl mx-auto w-full">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-amber-400 font-serif text-xl font-bold">🔍 Pencarian Artikel</h2>
                <button id="close-search" class="text-white hover:text-amber-400 transition p-2">
                    <i data-lucide="x" class="w-8 h-8"></i>
                </button>
            </div>

            <div class="relative mb-6">
                <input type="text" id="search-input" placeholder="Ketik kata kunci berita..." 
                    class="w-full bg-transparent border-b-2 border-slate-700 py-4 text-xl md:text-2xl text-white placeholder-slate-500 focus:outline-none focus:border-amber-400 transition">
                <i data-lucide="search" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 w-5 h-5"></i>
            </div>

            <div class="flex flex-wrap gap-2 mb-8" id="search-filters">
                <button class="filter-btn active bg-amber-400 text-red-900 px-4 py-1.5 rounded-full text-xs font-bold transition" data-cat="all">Semua</button>
                <button class="filter-btn border border-slate-700 text-slate-300 px-4 py-1.5 rounded-full text-xs hover:bg-white/10 transition" data-cat="Nasional">Nasional</button>
                <button class="filter-btn border border-slate-700 text-slate-300 px-4 py-1.5 rounded-full text-xs hover:bg-white/10 transition" data-cat="Ekonomi">Ekonomi</button>
                <button class="filter-btn border border-slate-700 text-slate-300 px-4 py-1.5 rounded-full text-xs hover:bg-white/10 transition" data-cat="Teknologi">Teknologi</button>
                <button class="filter-btn border border-slate-700 text-slate-300 px-4 py-1.5 rounded-full text-xs hover:bg-white/10 transition" data-cat="Olahraga">Olahraga</button>
                <button class="filter-btn border border-slate-700 text-slate-300 px-4 py-1.5 rounded-full text-xs hover:bg-white/10 transition" data-cat="Feature">Feature</button>
                <button class="filter-btn border border-slate-700 text-slate-300 px-4 py-1.5 rounded-full text-xs hover:bg-white/10 transition" data-cat="Cek Fakta">Cek Fakta</button>
            </div>

            <div id="search-results-list" class="space-y-3 max-h-[50vh] overflow-y-auto pr-2 custom-scrollbar">
                <p class="text-slate-400 text-sm text-center py-8">Ketik minimal 2 karakter untuk mencari...</p>
            </div>
        </div>
    </div>

    <script type="module" src="./js/layout-loader.js"></script>
    <script type="module" src="./js/firebase-config.js"></script>
    <script type="module" src="./js/public.js"></script>
</body>  
</html>
