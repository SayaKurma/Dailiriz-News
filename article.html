<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dailiriz - Baca Artikel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
    <meta name="description" content="" id="meta-description">
    <meta property="og:title" content="" id="og-title">
    <meta property="og:description" content="" id="og-description">
    <meta property="og:image" content="" id="og-image">
    <meta property="og:url" content="" id="og-url">
    <meta name="twitter:card" content="summary_large_image">
    <script type="application/ld+json" id="article-schema"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        gold: {
                            400: '#FFD700',
                            500: '#DAA520',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #c53030;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #9b2c2c;
        }
        .article-content p {
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }
        .article-content h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: #1f2937;
        }
        .article-content h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            color: #374151;
        }
        .article-content blockquote {
            border-left: 4px solid #dc2626;
            padding-left: 1.5rem;
            margin: 2rem 0;
            font-style: italic;
            color: #4b5563;
        }
        .article-content ul {
            list-style-type: disc;
            padding-left: 2rem;
            margin-bottom: 1.5rem;
        }
        .article-content ol {
            list-style-type: decimal;
            padding-left: 2rem;
            margin-bottom: 1.5rem;
        }
        @media (max-width: 768px) {
            .article-content h2 {
                font-size: 1.3rem;
                margin-top: 1.5rem;
                margin-bottom: 0.75rem;
            }
            .article-content h3 {
                font-size: 1.1rem;
                margin-top: 1.25rem;
                margin-bottom: 0.75rem;
            }
            .article-content p {
                font-size: 0.95rem;
                line-height: 1.7;
                margin-bottom: 1.25rem;
            }
            .share-buttons {
                flex-direction: column;
                gap: 0.5rem;
            }
            .share-buttons button {
                width: 100%;
                justify-content: center;
            }
        }
        @media (max-width: 640px) {
            #article-title {
                font-size: 1.75rem !important;
                line-height: 1.3 !important;
            }
            .article-meta {
                flex-direction: column;
                gap: 0.5rem !important;
                align-items: flex-start !important;
            }
            #related-articles {
                grid-template-columns: 1fr !important;
            }
        }
        .image-hover-zoom {
            overflow: hidden;
        }
        .image-hover-zoom img {
            transition: transform 0.5s ease;
        }
        .image-hover-zoom:hover img {
            transform: scale(1.05);
        }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-stone-50 text-slate-800 flex flex-col min-h-screen">
    <div id="layout-header"></div>

    <main class="container mx-auto px-4 py-6 md:py-8 flex-grow">
        <div class="max-w-4xl mx-auto">
            <nav class="mb-6 md:mb-8 text-sm text-slate-500">
                <a href="index.html" class="hover:text-red-600">Beranda</a>
                <span class="mx-2">/</span>
                <span id="article-category" class="text-red-600 font-medium"></span>
            </nav>

            <header class="mb-6 md:mb-8">
                <span id="article-category-badge" class="inline-block bg-red-100 text-red-700 text-xs font-bold px-3 py-1 rounded-full mb-3 md:mb-4"></span>
                <h1 id="article-title" class="font-serif text-2xl md:text-3xl lg:text-4xl xl:text-5xl font-bold text-slate-900 leading-tight mb-3 md:mb-4"></h1>
                <div class="flex flex-col md:flex-row md:items-center gap-2 md:gap-4 text-slate-600 text-sm mb-4 md:mb-6 article-meta">
                    <div class="flex items-center gap-2">
                        <i data-lucide="user" class="w-4 h-4"></i>
                        <span id="article-author"></span>
                    </div>
                    <div class="flex items-center gap-2">
                        <i data-lucide="calendar" class="w-4 h-4"></i>
                        <span id="article-date"></span>
                    </div>
                    <div class="flex items-center gap-2">
                        <i data-lucide="clock" class="w-4 h-4"></i>
                        <span id="article-time">5 min read</span>
                    </div>
                </div>
            </header>

            <div class="mb-6 md:mb-8 rounded-xl overflow-hidden shadow-lg image-hover-zoom">
                <img id="article-image" src="" alt="" class="w-full h-auto max-h-[300px] md:max-h-[400px] lg:max-h-[500px] object-cover" loading="eager" fetchpriority="high">
                <div class="mt-2 px-2 md:px-0">
                    <p class="text-xs text-slate-500 italic" id="image-caption"></p>
                    <p class="text-xs text-slate-400 mt-1">
                        Sumber: <span id="image-source-dynamic">Memuat...</span>
                    </p>
                </div>
            </div>

            <article class="mb-8 md:mb-12 px-2 md:px-0">
                <div id="article-content" class="prose prose-lg max-w-none prose-slate prose-a:text-red-600 hover:prose-a:text-red-700 prose-img:rounded-lg prose-headings:font-serif"></div>
            </article>

            <div class="bg-slate-50 p-4 md:p-6 rounded-xl mb-8 md:mb-12">
                <h3 class="font-bold text-lg mb-3 md:mb-4 text-slate-800">Bagikan Artikel Ini</h3>
                <div class="flex flex-col md:flex-row gap-2 md:gap-4 share-buttons">
                    <button class="flex items-center justify-center md:justify-start gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                        <i data-lucide="facebook" class="w-4 h-4"></i>
                        Facebook
                    </button>
                    <button class="flex items-center justify-center md:justify-start gap-2 bg-blue-400 text-white px-4 py-2 rounded-lg hover:bg-blue-500 transition">
                        <i data-lucide="twitter" class="w-4 h-4"></i>
                        Twitter
                    </button>
                    <button class="flex items-center justify-center md:justify-start gap-2 bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition">
                        <i data-lucide="link" class="w-4 h-4"></i>
                        Salin Link
                    </button>
                </div>
            </div>

            <section class="mb-10 md:mb-16">
                <h2 class="font-serif text-xl md:text-2xl font-bold text-slate-800 mb-4 md:mb-6 pb-2 border-b border-slate-200">Artikel Terkait</h2>
                <div id="related-articles" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6"></div>
            </section>

            <section class="bg-white rounded-xl shadow-sm p-4 md:p-6 mb-8 md:mb-12">
                <h2 class="font-serif text-xl md:text-2xl font-bold text-slate-800 mb-4 md:mb-6">Komentar</h2>
                <div class="mb-6 md:mb-8">
                    <input type="text" id="comment-name" placeholder="Nama Anda (opsional)" class="w-full p-3 border border-slate-300 rounded-lg focus:outline-none focus:border-red-500 text-sm mb-2">
                    <textarea id="comment-input" placeholder="Tulis komentar Anda..." class="w-full p-3 md:p-4 border border-slate-300 rounded-lg focus:outline-none focus:border-red-500 focus:ring-2 focus:ring-red-200 text-sm md:text-base" rows="4"></textarea>
                    <button id="submit-comment" class="mt-3 md:mt-4 bg-red-600 text-white px-5 md:px-6 py-2 rounded-lg font-medium hover:bg-red-700 transition w-full md:w-auto">Kirim Komentar</button>
                </div>
                <div id="comments-list" class="space-y-4 md:space-y-6"></div>
            </section>
        </div>
    </main>

    <div id="layout-footer"></div>

    <div id="toast" class="fixed bottom-5 right-5 bg-white border-l-4 border-green-500 text-slate-800 px-6 py-4 rounded shadow-2xl transform translate-y-24 transition-transform duration-300 z-50 flex items-center gap-3">
        <i data-lucide="check-circle" class="text-green-500"></i>
        <div>
            <h4 class="font-bold text-sm">Berhasil!</h4>
            <p class="text-xs text-slate-600" id="toast-message"></p>
        </div>
    </div>

    <div id="search-modal" class="fixed inset-0 bg-slate-900/95 z-[60] hidden flex-col p-6 md:p-20 transition-all duration-300 backdrop-blur-sm">
        <div class="max-w-4xl mx-auto w-full">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-amber-400 font-serif text-xl font-bold">🔍 Pencarian Artikel</h2>
                <button id="close-search" class="text-white hover:text-amber-400 transition p-2">
                    <i data-lucide="x" class="w-8 h-8"></i>
                </button>
            </div>
            <div class="relative mb-6">
                <input type="text" id="search-input" placeholder="Ketik kata kunci berita..."
                    class="w-full bg-transparent border-b-2 border-slate-700 py-4 text-xl md:text-2xl text-white placeholder-slate-500 focus:outline-none focus:border-amber-400 transition">
                <i data-lucide="search" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 w-5 h-5"></i>
            </div>
            <div class="flex flex-wrap gap-2 mb-8" id="search-filters">
                <button class="filter-btn active bg-amber-400 text-red-900 px-4 py-1.5 rounded-full text-xs font-bold transition" data-cat="all">Semua</button>
                <button class="filter-btn border border-slate-700 text-slate-300 px-4 py-1.5 rounded-full text-xs hover:bg-white/10 transition" data-cat="Nasional">Nasional</button>
                <button class="filter-btn border border-slate-700 text-slate-300 px-4 py-1.5 rounded-full text-xs hover:bg-white/10 transition" data-cat="Ekonomi">Ekonomi</button>
                <button class="filter-btn border border-slate-700 text-slate-300 px-4 py-1.5 rounded-full text-xs hover:bg-white/10 transition" data-cat="Teknologi">Teknologi</button>
                <button class="filter-btn border border-slate-700 text-slate-300 px-4 py-1.5 rounded-full text-xs hover:bg-white/10 transition" data-cat="Olahraga">Olahraga</button>
            </div>
            <div id="search-results-list" class="space-y-3 max-h-[50vh] overflow-y-auto pr-2 custom-scrollbar">
                <p class="text-slate-400 text-sm text-center py-8">Ketik minimal 2 karakter untuk mencari...</p>
            </div>
        </div>
    </div>

    <script type="module" src="./js/layout-loader.js"></script>
    <script type="module" src="./js/firebase-config.js"></script>
    <script type="module" src="./js/article-detail.js"></script>
</body>
</html>
