<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | Dailiriz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gradient-to-br from-red-900 via-red-700 to-amber-500 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="flex items-center justify-center gap-2 mb-4">
                <i data-lucide="shield" class="text-red-600 w-8 h-8"></i>
                <h1 class="font-serif text-2xl font-bold text-slate-800">
                    Daili<span class="text-amber-500 italic">Riz</span>
                </h1>
            </div>
            <p class="text-slate-600">Login untuk mengakses panel admin</p>
        </div>

        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Email</label>
                <input type="email" id="email" required 
                       class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:outline-none"
                       placeholder="admin@dailiriz.id">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Password</label>
                <input type="password" id="password" required 
                       class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:outline-none"
                       placeholder="••••••••">
            </div>

            <div id="error-message" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-lg"></div>

            <button type="submit" 
                    class="w-full bg-red-600 text-white py-3 rounded-lg font-medium hover:bg-red-700 transition flex items-center justify-center gap-2">
                <i data-lucide="log-in" class="w-4 h-4"></i>
                Masuk
            </button>
        </form>

        <p class="text-center text-xs text-slate-400 mt-6">
            &copy; 2025 Dailiriz. Panel Admin.
        </p>
    </div>

    <script type="module">
        import { loginAdmin } from './js/auth.js';
        
        lucide.createIcons();
        
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-message');
            
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" class="w-4 h-4 animate-spin"></i> Memproses...';
            lucide.createIcons();
            
            const result = await loginAdmin(email, password);
            
            if (result.success) {
                window.location.href = 'admin.html';
            } else {
                errorEl.textContent = result.message;
                errorEl.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = originalText;
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
